name: stc
on:
  push:
    # since master is a symbolic reference to main, don't run for both
    branches-ignore:
    - 'master'

  workflow_dispatch:

jobs:
  stc:
    strategy:
      fail-fast: false
      matrix:
        include:
        - pkgarch: x86_64
          runarch: x86_64
          runner: windows-latest
        - pkgarch: x86_64
          runarch: arm64
          runner: windows-11-arm

    runs-on: ${{ matrix.runner }}

    steps:
    - run: git config --global core.autocrlf input
    - uses: actions/checkout@v6

    # install cygwin and build tools
    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@master
      with:
        platform: ${{ matrix.pkgarch }}
        packages: |
          gcc-g++
          meson
          ninja
        allow-test-packages: true

    # build
    - name: Build tests
      run: |
        export PATH=/usr/bin:$(cygpath ${SYSTEMROOT})/system32
        meson setup _build
        ninja -C _build
      shell: bash --noprofile --norc -o igncr -eo pipefail '{0}'

    # test
    - name: Run tests
      run: |
        export PATH=/usr/bin:$(cygpath ${SYSTEMROOT})/system32
        uname -a
        meson test -C _build
      shell: bash --noprofile --norc -o igncr -eo pipefail '{0}'

    # upload test logs to facilitate investigation of problems
    - name: Upload test logs
      uses: actions/upload-artifact@v7
      with:
        name: stc-logs-${{ matrix.pkgarch }}-on-${{ matrix.runarch }}
        path: |
          _build/meson-logs
      if: ${{ !cancelled() }}
